version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    registries:
      npm.npmjs.org:
        type: npm
        url: https://registry.npmjs.org
        token: ${{ secrets.NPM_TOKEN }}
